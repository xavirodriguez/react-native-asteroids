<div id="dp"><p style="color:var(--color-text-tertiary)">Haz clic en cualquier capa o componente para ver su descripción.</p></div>

<script>
const INFO = {
  platform: ['Platform — dependencias externas', '@shopify/react-native-skia provee el SkCanvas para renderizado 2D acelerado por GPU. matter-js es el motor de física de cuerpos rígidos 2D. react-native-reanimated habilita SharedValues thread-safe que conectan el motor con la capa UI de React Native.'],
  gameloop: ['GameLoop', 'Loop de tiempo fijo con acumulador de tiempo residual. Desacopla la tasa de simulación del frame rate del dispositivo. Expone deltaTime por tick y un factor alpha de interpolación para que el renderer suavice posiciones entre ticks consecutivos (lerp). Controla pause, resume y restart.'],
  scene: ['SceneManager', 'Gestiona la pila de escenas del juego: menú principal, gameplay, pausa, game over. Cada escena puede registrar y limpiar sus propias entidades y sistemas en el World. Permite transiciones entre escenas conservando o descartando el estado del World según corresponda.'],
  network: ['NetworkTransport', 'Capa opcional para multijugador determinista. Recibe inputs de jugadores remotos y los inyecta en el InputBuffer antes de cada tick. Con la misma seed inicial, todos los clientes ejecutan exactamente la misma simulación y convergen al mismo estado del World.'],
  replay: ['ReplayRecorder', 'Graba la secuencia de inputs frame a frame junto a la seed de inicialización. La reproducción re-ejecuta la simulación determinista desde cero obteniendo exactamente el mismo estado. Útil para debugging, kill-cam o compartir partidas guardadas.'],
  world: ['World — ECS (Entity-Component-System)', 'El corazón del motor. Las entidades son IDs numéricos. Los componentes son structs de datos planos sin lógica. Los Systems contienen toda la lógica de juego y operan sobre el World cada tick. API clave: createEntity, addComponent, query, getComponent, snapshot/restore para determinismo, setResource para globals compartidos.'],
  input: ['Input — fase 1', 'UnifiedInputSystem unifica teclado, gamepad y gestos táctiles (TouchController) en un mapa de acciones lógicas definidas por el juego (thrust, fire, rotate…). El InputBuffer guarda el snapshot de inputs del tick actual. NetworkTransport y ReplayRecorder pueden sobreescribir el buffer para inyectar inputs simulados.'],
  simulation: ['Simulation — fase 2', 'Actualiza física y ciclo de vida: VelocitySystem mueve entidades según su VelocityComponent (dx/dy/vAngle). BoundarySystem gestiona los bordes del mundo (wrap, bounce o destroy). TTLSystem destruye entidades al expirar su tiempo de vida. StateMachineSystem avanza FSMs. HierarchySystem propaga transforms padre-hijo.'],
  collision: ['Collision — fase 3', 'BroadPhase aplica sweep-and-prune para identificar pares de entidades cercanos en O(n log n). SpatialHash divide el espacio en celdas para queries geoespaciales rápidas. Los pares candidatos pasan a narrowphase con Collider2DComponent. Las colisiones confirmadas se publican en el EventBus para la fase siguiente.'],
  gamerules: ['Game rules — fase 4', 'Lógica específica del juego. Consume eventos del EventBus (colisiones, TTL expirado). Actualiza puntaje, vidas y multiplicadores. Spawnea nuevas entidades (partículas, power-ups, asteroides). Detecta condiciones de victoria/derrota y notifica a SceneManager para transicionar a la escena correspondiente.'],
  rendering: ['Rendering — fase 5 (Presentation)', 'SkiaRenderer dibuja el World sobre un SkCanvas de React Native Skia. Camera2D aplica zoom, smooth-follow de entidades y camera shake. InterpolationPrepSystem calcula posiciones interpoladas usando el alpha del GameLoop para movimiento visualmente suave. TilemapRenderSystem dibuja capas de tiles. TrailComponent renderiza estelas de movimiento.']
};
function d(key) {
  const info = INFO[key];
  if (!info) return;
  document.getElementById('dp').innerHTML = '<p><strong>' + info[0] + '</strong> — ' + info[1] + '</p>';
}
</script>
